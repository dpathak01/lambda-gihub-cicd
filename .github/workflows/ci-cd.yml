name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - run: npm ci
      - run: zip -r function.zip src package.json package-lock.json
      - run: |
          FUNCTION_NAME="${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}"
          ROLE_ARN="${{ secrets.AWS_LAMBDA_ROLE_ARN }}"
          REGION="${{ secrets.AWS_REGION }}"

          if aws lambda get-function --function-name "$FUNCTION_NAME" --region "$REGION" >/dev/null 2>&1; then
            echo "Function exists, updating code..."
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://function.zip
          else
            if [ -n "$ROLE_ARN" ]; then
              echo "Function not found, creating new Lambda function..."
              aws lambda create-function \
                --function-name "$FUNCTION_NAME" \
                --runtime nodejs20.x \
                --role "$ROLE_ARN" \
                --handler src/index.handler \
                --zip-file fileb://function.zip
            else
              echo "Function not found and AWS_LAMBDA_ROLE_ARN is not set."
              echo "Set AWS_LAMBDA_ROLE_ARN to create the Lambda automatically, or create the function manually first."
              exit 1
            fi
          fi
