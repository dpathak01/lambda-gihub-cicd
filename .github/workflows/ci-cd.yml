# ci-cd.yml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  deploy:
    name: Deploy with SAM
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/setup-sam@v1
      - run: npm ci
      - run: sam build
      - run: |
          STACK_NAME="${{ secrets.AWS_SAM_STACK_NAME }}"
          if [ -z "$STACK_NAME" ]; then
            STACK_NAME="lambda-github-cicd-stack"
          fi

          S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}"
          TABLE_NAME="${{ secrets.TABLE_NAME }}"
          LAMBDA_NAME="${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"

          missing=0
          if [ -z "$S3_BUCKET" ]; then
            echo "Missing required secret: AWS_S3_BUCKET"
            missing=1
          fi
          if [ -z "$TABLE_NAME" ]; then
            echo "Missing required secret: TABLE_NAME"
            missing=1
          fi
          if [ -z "$LAMBDA_NAME" ]; then
            echo "Missing required secret: AWS_LAMBDA_FUNCTION_NAME"
            missing=1
          fi
          if [ -z "$REGION" ]; then
            echo "Missing required secret: AWS_REGION"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          sam deploy \
            --stack-name "$STACK_NAME" \
            --template-file .aws-sam/build/template.yaml \
            --s3-bucket "$S3_BUCKET" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "TableName=$TABLE_NAME" "LambdaFunctionName=$LAMBDA_NAME" \
            --region "$REGION" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

